<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/brands-logos/high-resolution-color-logo-Furdeco.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./css/login.css" />
    <title>FurDeco - Furniture with style</title>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card" aria-label="FurDeco login screen">
        <section class="login-form-panel">
          <div class="login-form-panel__brand">
            <a href="./index.html"
              ><img
                src="./assets/brands-logos/high-resolution-color-logo-Furdeco-nobg.png"
                alt="FurDeco"
                class="login-form-panel__logo"
            /></a>
            <p class="login-eyebrow">Quiet comfort, shaped for daily rituals</p>
          </div>

          <p class="login-eyebrow">Welcome back</p>
          <h2>Sign in to continue</h2>
          <p class="login-description">
            Manage your shortlist, checkout faster and keep your interior ideas
            in one place.
          </p>

          <form class="login-form">
            <label for="email">Email address</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="name@example.com"
            />

            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Enter your password"
            />

            <div class="login-actions-row">
              <label class="login-remember">
                <input type="checkbox" name="remember" />
                <span>Remember me</span>
              </label>

              <a href="./contact.html">Forgot password?</a>
            </div>

            <button type="submit" class="login-button">Enter FurDeco</button>
          </form>

          <div class="login-divider" aria-hidden="true">
            <span></span>
            <p>or continue with</p>
            <span></span>
          </div>

          <div class="login-socials">
            <button type="button" class="login-social-button">
              <img
                class="login-icons"
                src="./assets/product-category-assets/icons8-google-48.png"
                alt=""
              />Google
            </button>
            <button type="button" class="login-social-button">
              <img
                class="login-icons"
                src="./assets/product-category-assets/icons8-apple-48.png"
                alt=""
              />Apple
            </button>
          </div>

          <p class="login-footer">
            Don’t have an account?
            <a href="./contact.html">Create one with us</a>
          </p>
        </section>
      </section>
    </main>
  </body>
</html>
